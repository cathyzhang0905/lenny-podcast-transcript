# Lenny Podcast → 中文 transcript watcher 配置

# 要监听的 YouTube 频道列表
# - name: 短名,用于日志识别
# - channel_id: YouTube 频道 ID(UC 开头),浏览器打开任意一集视频右键页面源码搜 "channelId" 可拿到
# - host: 该频道主持人名字(用于说话人标注)
channels:
  - name: lenny
    channel_id: UC6t1O76G0jYXOAoYCm153dA
    host: Lenny

# 翻译产物输出目录(相对 repo 根)
output_dir: ./transcripts

# 文件名模板。可用占位符:
#   {date}           视频上传日期 YYYY-MM-DD
#   {title}          视频标题(已清洗为文件安全字符)
#   {guest}          嘉宾名(已清洗)
#   {guest_company}  嘉宾公司(从 oembed author_name 拿,通常是频道名)
#   {video_id}       YouTube 视频 ID,11 字符,全局唯一
filename_template: "{date}_{title}"

# 翻译模型 ID(硅基流动或任何 OpenAI 兼容协议)
model: Qwen/Qwen2.5-72B-Instruct
